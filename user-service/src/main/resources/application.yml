server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: user-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/payflow_user?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:payflow}
    password: ${SPRING_DATASOURCE_PASSWORD:payflow}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}

jwt:
  secret: ${JWT_SECRET:payflow-local-development-secret-key-change-me}
  expiration: ${JWT_EXPIRATION:86400000}

clients:
  wallet-service:
    url: ${WALLET_SERVICE_URL:http://localhost:8082}
    provisioning-enabled: ${WALLET_PROVISIONING_ENABLED:true}

internal:
  secret: ${INTERNAL_SERVICE_SECRET:}

# [H-4] PARENT 역할은 초대 코드를 제출한 사용자에게만 부여된다.
# 운영 환경에서는 PARENT_INVITE_CODE 환경 변수로 교체한다.
# 빈 문자열이면 초대 코드 기능이 비활성화(PARENT 가입 불가)된다.
registration:
  parent-invite-code: ${PARENT_INVITE_CODE:PAYFLOW-PARENT-2024}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
