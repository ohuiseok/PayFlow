spring:
  datasource:
    url: jdbc:h2:mem:payflow_user_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

jwt:
  secret: payflow-test-secret-key-must-be-long-enough-1234567890
  expiration: 86400000

clients:
  wallet-service:
    provisioning-enabled: false
