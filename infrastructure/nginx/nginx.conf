worker_processes 2;
worker_rlimit_nofile 8192;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

  # Docker 내부 DNS - 요청 시점에 동적으로 hostname 해석
  resolver 127.0.0.11 valid=10s ipv6=off;

  # API Gateway upstream with keepalive (재사용 커넥션 풀)
  upstream api_gateway {
    zone api_gateway 64k;
    server api-gateway:8080 resolve;
    keepalive 256;
  }

  # HTTP → HTTPS 리다이렉트 (certbot ACME 챌린지 제외)
  server {
    listen 80;
    server_name www.pay-flow.cloud app.pay-flow.cloud;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # 로딩 페이지 + API Gateway
  server {
    listen 443 ssl;
    server_name www.pay-flow.cloud;

    ssl_certificate     /etc/letsencrypt/live/www.pay-flow.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.pay-flow.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index loading.html;

    location = /health {
      access_log off;
      add_header Access-Control-Allow-Origin "https://payflow-launchpad.vercel.app" always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Vary "Origin" always;
      proxy_pass http://api_gateway/health;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/users/login {
      limit_req zone=login_limit burst=3 nodelay;
      limit_req_status 429;
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_connect_timeout 5s;
    }

    location / {
      try_files $uri $uri/ /loading.html;
    }
  }

  # React 앱
  server {
    listen 443 ssl;
    server_name app.pay-flow.cloud;

    ssl_certificate     /etc/letsencrypt/live/www.pay-flow.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.pay-flow.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location = /api/users/login {
      limit_req zone=login_limit burst=3 nodelay;
      limit_req_status 429;
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
      proxy_connect_timeout 5s;
    }

    location / {
      set $sample_react http://sample-react:80;
      proxy_pass $sample_react;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
