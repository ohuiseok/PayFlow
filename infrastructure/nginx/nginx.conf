events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

  upstream api_gateway {
    server api-gateway:8080;
  }

  upstream sample_react {
    server sample-react:80;
  }

  # HTTP → HTTPS 리다이렉트 (certbot ACME 챌린지 제외)
  server {
    listen 80;
    server_name www.pay-flow.cloud app.pay-flow.cloud;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # 로딩 페이지 + API Gateway
  server {
    listen 443 ssl;
    server_name www.pay-flow.cloud;

    ssl_certificate     /etc/letsencrypt/live/www.pay-flow.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.pay-flow.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 로딩 페이지 (정적 HTML)
    root /usr/share/nginx/html;
    index loading.html;

    location = /health {
      access_log off;
      proxy_pass http://api_gateway/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/users/login {
      limit_req zone=login_limit burst=3 nodelay;
      limit_req_status 429;
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      try_files $uri $uri/ /loading.html;
    }
  }

  # React 앱
  server {
    listen 443 ssl;
    server_name app.pay-flow.cloud;

    ssl_certificate     /etc/letsencrypt/live/www.pay-flow.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.pay-flow.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    location / {
      proxy_pass http://sample_react;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
