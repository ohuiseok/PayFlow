events {
  worker_connections 1024;
}

http {
  # [M-2] 로그인 엔드포인트 Rate Limiting 설정이다.
  # binary_remote_addr을 키로 사용하면 일반 문자열보다 메모리를 절약할 수 있다.
  # 10m은 약 160,000개의 IP 상태를 저장할 수 있는 공유 메모리 크기이다.
  # rate=5r/m은 IP당 분당 최대 5회 요청을 허용한다. 브루트포스 로그인 공격 완화가 목적이다.
  limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

  upstream api_gateway {
    server api-gateway:8080;
  }

  server {
    listen 80;
    server_name _;

    # [M-2] 로그인 경로에 Rate Limiting을 적용한다.
    # burst=3은 순간 트래픽을 최대 3개까지 큐잉한다.
    # nodelay는 큐잉된 요청을 즉시 처리하되 초과분은 503으로 거부한다.
    location = /api/users/login {
      limit_req zone=login_limit burst=3 nodelay;
      limit_req_status 429;
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

