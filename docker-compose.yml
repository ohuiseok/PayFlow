name: ${PROJECT_NAME:-payflow}

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ${PROJECT_NAME:-payflow}-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/html:/usr/share/nginx/html:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      api-gateway:
        condition: service_healthy
      sample-react:
        condition: service_healthy
    networks:
      - payflow-network
    mem_limit: ${NGINX_MEM_LIMIT:-64m}
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    container_name: ${PROJECT_NAME:-payflow}-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"
    restart: unless-stopped

  sample-react:
    build:
      context: ./sample-react
      args:
        EXPO_PUBLIC_API_BASE_URL: ${BACKEND_BASE_URL:-http://localhost:8080}
        EXPO_PUBLIC_USE_DUMMY_DATA: ${FRONTEND_USE_DUMMY_DATA:-false}
        EXPO_PUBLIC_PARENT_INVITE_CODE: ${FRONTEND_PARENT_INVITE_CODE:-PAYFLOW-PARENT-2024}
        EXPO_PUBLIC_TOSS_CLIENT_KEY: ${EXPO_PUBLIC_TOSS_CLIENT_KEY:-}
    container_name: ${PROJECT_NAME:-payflow}-sample-react
    ports:
      - "${FRONTEND_PORT:-19006}:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - payflow-network
    mem_limit: ${FRONTEND_MEM_LIMIT:-128m}
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: ${PROJECT_NAME:-payflow}-mysql
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      USER_DB_NAME: ${USER_DB_NAME:-payflow_user}
      WALLET_DB_NAME: ${WALLET_DB_NAME:-payflow_wallet}
      BANKING_DB_NAME: ${BANKING_DB_NAME:-payflow_banking}
      TRANSFER_DB_NAME: ${TRANSFER_DB_NAME:-payflow_transfer}
      REWARD_DB_NAME: ${REWARD_DB_NAME:-payflow_reward}
      LEDGER_DB_NAME: ${LEDGER_DB_NAME:-payflow_ledger}
      SETTLEMENT_DB_NAME: ${SETTLEMENT_DB_NAME:-payflow_settlement}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --innodb-buffer-pool-size=${MYSQL_BUFFER_POOL_SIZE:-384M}
      - --max-connections=${MYSQL_MAX_CONNECTIONS:-80}
      - --performance-schema=OFF
    volumes:
      - mysql_data:/var/lib/mysql
      - ./infrastructure/mysql/init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${MYSQL_MEM_LIMIT:-512m}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-payflow}-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory ${REDIS_MAX_MEMORY:-96mb} --maxmemory-policy ${REDIS_MAX_MEMORY_POLICY:-allkeys-lru}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - payflow-network
    mem_limit: ${REDIS_MEM_LIMIT:-128m}
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.8.0
    container_name: ${PROJECT_NAME:-payflow}-kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID:-1}@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-1}
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-24}
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xms384m -Xmx768m}
    volumes:
      - kafka_data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${KAFKA_MEM_LIMIT:-1024m}
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
    container_name: ${PROJECT_NAME:-payflow}-api-gateway
    environment:
      JAVA_TOOL_OPTIONS: ${GATEWAY_JAVA_OPTS:--Xms128m -Xmx320m}
      USER_SERVICE_URI: http://user-service:8081
      WALLET_SERVICE_URI: http://wallet-service:8082
      BANKING_SERVICE_URI: http://banking-service:8086
      REWARD_SERVICE_URI: http://reward-service:8087
      TRANSFER_SERVICE_URI: http://transfer-service:8083
      LEDGER_SERVICE_URI: http://ledger-service:8084
      SETTLEMENT_SERVICE_URI: http://settlement-service:8085
      REDIS_HOST: ${REDIS_HOST:-redis}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      FRONTEND_ORIGIN: ${FRONTEND_BASE_URL:-http://localhost:19006}
    ports:
      - "${API_GATEWAY_PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${GATEWAY_MEM_LIMIT:-384m}
    restart: unless-stopped

  user-service:
    build:
      context: ./user-service
    container_name: ${PROJECT_NAME:-payflow}-user-service
    environment:
      JAVA_TOOL_OPTIONS: ${USER_JAVA_OPTS:--Xms128m -Xmx320m}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${USER_DB_NAME:-payflow_user}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${USER_JPA_DDL_AUTO:-validate}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      WALLET_SERVICE_URL: http://wallet-service:8082
      BANKING_SERVICE_URL: http://banking-service:8086
    depends_on:
      mysql:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${USER_MEM_LIMIT:-384m}
    restart: unless-stopped

  wallet-service:
    build:
      context: ./wallet-service
    container_name: ${PROJECT_NAME:-payflow}-wallet-service
    environment:
      JAVA_TOOL_OPTIONS: ${WALLET_JAVA_OPTS:--Xms128m -Xmx512m}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${WALLET_DB_NAME:-payflow_wallet}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${WALLET_JPA_DDL_AUTO:-validate}
      REDIS_HOST: ${REDIS_HOST:-redis}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      INTERNAL_SECRET: ${INTERNAL_SERVICE_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${WALLET_MEM_LIMIT:-640m}
    restart: unless-stopped

  banking-service:
    build:
      context: ./banking-service
    container_name: ${PROJECT_NAME:-payflow}-banking-service
    environment:
      JAVA_TOOL_OPTIONS: ${BANKING_JAVA_OPTS:--Xms128m -Xmx512m}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${BANKING_DB_NAME:-payflow_banking}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${BANKING_JPA_DDL_AUTO:-update}
      SPRING_FLYWAY_ENABLED: ${BANKING_FLYWAY_ENABLED:-false}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${BANKING_FLYWAY_BASELINE_ON_MIGRATE:-true}
      SPRING_FLYWAY_BASELINE_VERSION: ${BANKING_FLYWAY_BASELINE_VERSION:-5}
      WALLET_SERVICE_URL: http://wallet-service:8082
      LEDGER_SERVICE_URL: http://ledger-service:8084
      FRONTEND_ORIGIN: ${FRONTEND_BASE_URL:-http://localhost:19006}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      OPENBANKING_MODE: ${OPENBANKING_MODE:-mock}
      OPENBANKING_BASE_URL: ${OPENBANKING_BASE_URL:-https://testapi.openbanking.or.kr}
      OPENBANKING_CLIENT_ID: ${OPENBANKING_CLIENT_ID:-}
      OPENBANKING_CLIENT_SECRET: ${OPENBANKING_CLIENT_SECRET:-}
      OPENBANKING_CALLBACK_URL: ${BACKEND_BASE_URL:-http://localhost:8080}/api/bank/openbanking/callback
      OPENBANKING_CLIENT_USE_CODE: ${OPENBANKING_CLIENT_USE_CODE:-}
      OPENBANKING_ACCESS_TOKEN: ${OPENBANKING_ACCESS_TOKEN:-}
      OPENBANKING_USER_ACCESS_TOKEN: ${OPENBANKING_USER_ACCESS_TOKEN:-${OPENBANKING_ACCESS_TOKEN:-}}
      OPENBANKING_ORG_ACCESS_TOKEN: ${OPENBANKING_ORG_ACCESS_TOKEN:-${OPENBANKING_ACCESS_TOKEN:-}}
      OPENBANKING_CNTR_ACCOUNT_TYPE: ${OPENBANKING_CNTR_ACCOUNT_TYPE:-N}
      OPENBANKING_CNTR_ACCOUNT_NUM: ${OPENBANKING_CNTR_ACCOUNT_NUM:-}
      OPENBANKING_WD_PASS_PHRASE: ${OPENBANKING_WD_PASS_PHRASE:-NONE}
      OPENBANKING_CHARGE_DPS_PRINT_CONTENT: ${OPENBANKING_CHARGE_DPS_PRINT_CONTENT:-PAYFLOW_CHARGE}
      OPENBANKING_CHARGE_WD_PRINT_CONTENT: ${OPENBANKING_CHARGE_WD_PRINT_CONTENT:-PAYFLOW}
      OPENBANKING_WITHDRAWAL_WD_PRINT_CONTENT: ${OPENBANKING_WITHDRAWAL_WD_PRINT_CONTENT:-PAYFLOW_WITHDRAWAL}
      OPENBANKING_TRANSFER_PURPOSE: ${OPENBANKING_TRANSFER_PURPOSE:-TR}
      TOSS_PAYMENTS_MODE: ${TOSS_PAYMENTS_MODE:-mock}
      TOSS_PAYMENTS_API_BASE_URL: ${TOSS_PAYMENTS_API_BASE_URL:-https://api.tosspayments.com}
      TOSS_PAYMENTS_CLIENT_KEY: ${TOSS_PAYMENTS_CLIENT_KEY:-}
      TOSS_PAYMENTS_SECRET_KEY: ${TOSS_PAYMENTS_SECRET_KEY:-}
      TOSS_PAYMENTS_WEBHOOK_SECRET: ${FRONTEND_BASE_URL:-http://localhost:19006}/test
    depends_on:
      mysql:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8086/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${BANKING_MEM_LIMIT:-640m}
    restart: unless-stopped

  transfer-service:
    build:
      context: ./transfer-service
    container_name: ${PROJECT_NAME:-payflow}-transfer-service
    environment:
      JAVA_TOOL_OPTIONS: ${TRANSFER_JAVA_OPTS:--Xms128m -Xmx512m}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${TRANSFER_DB_NAME:-payflow_transfer}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${TRANSFER_JPA_DDL_AUTO:-update}
      SPRING_FLYWAY_ENABLED: ${TRANSFER_FLYWAY_ENABLED:-false}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${TRANSFER_FLYWAY_BASELINE_ON_MIGRATE:-true}
      SPRING_FLYWAY_BASELINE_VERSION: ${TRANSFER_FLYWAY_BASELINE_VERSION:-3}
      REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      WALLET_SERVICE_URI: http://wallet-service:8082
      INTERNAL_SECRET: ${INTERNAL_SERVICE_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      TRANSFER_COMPLETED_TOPIC: ${TRANSFER_COMPLETED_TOPIC:-transfer.completed}
      TRANSFER_FAILED_TOPIC: ${TRANSFER_FAILED_TOPIC:-transfer.failed}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${TRANSFER_MEM_LIMIT:-640m}
    restart: unless-stopped

  reward-service:
    build:
      context: ./reward-service
    container_name: ${PROJECT_NAME:-payflow}-reward-service
    environment:
      JAVA_TOOL_OPTIONS: ${REWARD_JAVA_OPTS:--Xms128m -Xmx512m}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${REWARD_DB_NAME:-payflow_reward}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${REWARD_JPA_DDL_AUTO:-validate}
      USER_SERVICE_URL: http://user-service:8081
      TRANSFER_SERVICE_URL: http://transfer-service:8083
      WALLET_SERVICE_URL: http://wallet-service:8082
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      user-service:
        condition: service_healthy
      transfer-service:
        condition: service_healthy
      wallet-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8087/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${REWARD_MEM_LIMIT:-640m}
    restart: unless-stopped

  ledger-service:
    build:
      context: ./ledger-service
    container_name: ${PROJECT_NAME:-payflow}-ledger-service
    environment:
      JAVA_TOOL_OPTIONS: ${LEDGER_JAVA_OPTS:--Xms128m -Xmx320m}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${LEDGER_DB_NAME:-payflow_ledger}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${LEDGER_JPA_DDL_AUTO:-validate}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
      TRANSFER_COMPLETED_TOPIC: ${TRANSFER_COMPLETED_TOPIC:-transfer.completed}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8084/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${LEDGER_MEM_LIMIT:-384m}
    restart: unless-stopped

  settlement-service:
    profiles:
      - settlement
    build:
      context: ./settlement-service
    container_name: ${PROJECT_NAME:-payflow}-settlement-service
    environment:
      JAVA_TOOL_OPTIONS: ${SETTLEMENT_JAVA_OPTS:--Xms128m -Xmx320m}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${SETTLEMENT_DB_NAME:-payflow_settlement}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SETTLEMENT_JPA_DDL_AUTO:-validate}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      INTERNAL_SERVICE_SECRET: ${INTERNAL_SERVICE_SECRET}
      GATEWAY_INTERNAL_SECRET: ${GATEWAY_INTERNAL_SECRET}
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/actuator/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    networks:
      - payflow-network
    mem_limit: ${SETTLEMENT_MEM_LIMIT:-384m}
    restart: unless-stopped

volumes:
  mysql_data:
    name: ${MYSQL_VOLUME_NAME:-payflow_mysql_data}
  kafka_data:
    name: ${KAFKA_VOLUME_NAME:-payflow_kafka_data}
  certbot_www:
  certbot_conf:
  nginx_logs:
    name: payflow-nginx-logs

networks:
  payflow-network:
    driver: bridge
