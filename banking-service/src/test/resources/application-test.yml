spring:
  datasource:
    url: jdbc:h2:mem:payflow_banking_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

internal:
  secret: test-internal-secret

gateway:
  request-filter:
    enabled: false

settlement:
  outbox:
    enabled: false

openbanking:
  client-id: test-client-id
  callback-url: http://localhost:8080/api/bank/openbanking/callback
