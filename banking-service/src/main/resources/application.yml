server:
  port: ${SERVER_PORT:8086}

spring:
  application:
    name: banking-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/payflow_banking?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:payflow}
    password: ${SPRING_DATASOURCE_PASSWORD:payflow}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:5}
    baseline-description: Hibernate initial schema

clients:
  wallet-service:
    url: ${WALLET_SERVICE_URL:http://localhost:8082}
  ledger-service:
    url: ${LEDGER_SERVICE_URL:http://localhost:8084}

openbanking:
  mode: ${OPENBANKING_MODE:mock}
  base-url: ${OPENBANKING_BASE_URL:https://testapi.openbanking.or.kr}
  client-id: ${OPENBANKING_CLIENT_ID:${API_CLIENT_ID:}}
  client-secret: ${OPENBANKING_CLIENT_SECRET:${API_CLIENT_SECRET:}}
  callback-url: ${OPENBANKING_CALLBACK_URL:${API_CALLBACK_URL:}}
  client-use-code: ${OPENBANKING_CLIENT_USE_CODE:}
  access-token: ${OPENBANKING_ACCESS_TOKEN:}
  user-access-token: ${OPENBANKING_USER_ACCESS_TOKEN:${OPENBANKING_ACCESS_TOKEN:}}
  org-access-token: ${OPENBANKING_ORG_ACCESS_TOKEN:${OPENBANKING_ACCESS_TOKEN:}}
  cntr-account-type: ${OPENBANKING_CNTR_ACCOUNT_TYPE:N}
  cntr-account-num: ${OPENBANKING_CNTR_ACCOUNT_NUM:}
  wd-pass-phrase: ${OPENBANKING_WD_PASS_PHRASE:NONE}
  charge-dps-print-content: ${OPENBANKING_CHARGE_DPS_PRINT_CONTENT:PAYFLOW_CHARGE}
  charge-wd-print-content: ${OPENBANKING_CHARGE_WD_PRINT_CONTENT:PAYFLOW}
  withdrawal-wd-print-content: ${OPENBANKING_WITHDRAWAL_WD_PRINT_CONTENT:PAYFLOW_WITHDRAWAL}
  transfer-purpose: ${OPENBANKING_TRANSFER_PURPOSE:TR}
  token-encryption-secret: ${OPENBANKING_TOKEN_ENCRYPTION_SECRET:${INTERNAL_SERVICE_SECRET:payflow-local-token-secret}}
  result-check-fixed-delay-ms: ${OPENBANKING_RESULT_CHECK_FIXED_DELAY_MS:60000}
  connect-timeout-ms: ${OPENBANKING_CONNECT_TIMEOUT_MS:3000}
  read-timeout-ms: ${OPENBANKING_READ_TIMEOUT_MS:5000}

toss-payments:
  mode: ${TOSS_PAYMENTS_MODE:mock}
  api-base-url: ${TOSS_PAYMENTS_API_BASE_URL:https://api.tosspayments.com}
  client-key: ${TOSS_PAYMENTS_CLIENT_KEY:}
  secret-key: ${TOSS_PAYMENTS_SECRET_KEY:}
  webhook-secret: ${TOSS_PAYMENTS_WEBHOOK_SECRET:}

frontend:
  origin: ${FRONTEND_ORIGIN:http://localhost:19006}

internal:
  secret: ${INTERNAL_SERVICE_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
