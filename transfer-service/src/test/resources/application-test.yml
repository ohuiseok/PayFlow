spring:
  datasource:
    url: jdbc:h2:mem:payflow_transfer_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false

feign:
  circuitbreaker:
    enabled: false

internal:
  secret: test-internal-secret

outbox:
  publisher:
    enabled: false
