server:
  port: ${SERVER_PORT:8083}

spring:
  application:
    name: transfer-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/payflow_transfer?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:payflow}
    password: ${SPRING_DATASOURCE_PASSWORD:payflow}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:30}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 10000
      idle-timeout: 30000
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: transfer-service
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.payflow.transfer.event
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${HIBERNATE_FORMAT_SQL:false}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:3}
    baseline-description: Hibernate initial schema

feign:
  circuitbreaker:
    enabled: true

clients:
  wallet-service:
    url: ${WALLET_SERVICE_URI:http://localhost:8082}

internal:
  secret: ${INTERNAL_SECRET:${INTERNAL_SERVICE_SECRET:}}

topics:
  transfer-completed: ${TRANSFER_COMPLETED_TOPIC:transfer.completed}
  transfer-failed: ${TRANSFER_FAILED_TOPIC:transfer.failed}

transfer:
  wallet-lock:
    ttl: ${TRANSFER_WALLET_LOCK_TTL:5s}

outbox:
  publisher:
    fixed-delay: ${OUTBOX_PUBLISHER_FIXED_DELAY:2000}
    send-timeout: ${OUTBOX_PUBLISHER_SEND_TIMEOUT:3s}
    max-retries: ${OUTBOX_PUBLISHER_MAX_RETRIES:5}
    processing-timeout: ${OUTBOX_PUBLISHER_PROCESSING_TIMEOUT:30s}

resilience4j:
  circuitbreaker:
    instances:
      wallet-service:
        register-health-indicator: true
        failure-rate-threshold: 50
        minimum-number-of-calls: 5
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        sliding-window-size: 10
  retry:
    instances:
      wallet-service:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      wallet-service:
        timeout-duration: 3s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,circuitbreakers
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
  health:
    circuitbreakers:
      enabled: true
