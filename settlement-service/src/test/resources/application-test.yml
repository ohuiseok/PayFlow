spring:
  datasource:
    url: jdbc:h2:mem:payflow_settlement_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always
  kafka:
    listener:
      auto-startup: false

gateway:
  request-filter:
    enabled: false

internal:
  secret: test-internal-secret
