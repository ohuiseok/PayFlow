<svg width="1800" height="1100" viewBox="0 0 1800 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1800" height="1100" fill="#F6F8FA"/>
  <rect x="80" y="70" width="1640" height="960" rx="36" fill="#FFFFFF"/>
  <text x="128" y="145" fill="#151B22" font-family="Arial, sans-serif" font-size="44" font-weight="800">PayFlow 예상 화면 구성</text>
  <text x="128" y="188" fill="#64707D" font-family="Arial, sans-serif" font-size="22">부모가 크레딧을 충전하고, 자녀에게 미션과 보상을 걸고, 성공 시 자녀가 돈을 버는 흐름</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#16202A" flood-opacity="0.12"/>
    </filter>
    <style>
      .phone { fill: #111820; }
      .screen { fill: #F8FAFB; }
      .card { fill: #FFFFFF; stroke: #E4E9EE; stroke-width: 1.5; }
      .muted { fill: #66717C; font-family: Arial, sans-serif; }
      .title { fill: #17202A; font-family: Arial, sans-serif; font-weight: 800; }
      .label { fill: #26313C; font-family: Arial, sans-serif; font-weight: 700; }
      .green { fill: #1F7A5C; }
      .blue { fill: #2B6CB0; }
      .amber { fill: #8A6517; }
      .buttonText { fill: #FFFFFF; font-family: Arial, sans-serif; font-size: 17px; font-weight: 800; }
    </style>
  </defs>

  <g transform="translate(130 245)" filter="url(#shadow)">
    <rect class="phone" width="340" height="680" rx="44"/>
    <rect class="screen" x="16" y="18" width="308" height="644" rx="32"/>
    <rect x="129" y="34" width="82" height="8" rx="4" fill="#27313C"/>
    <text x="42" y="92" class="muted" font-size="14" font-weight="700">부모 지갑</text>
    <text x="42" y="126" class="title" font-size="24">부모 크레딧</text>
    <rect x="42" y="154" width="256" height="134" rx="12" fill="#17202A"/>
    <text x="62" y="190" fill="#A9B7C4" font-family="Arial, sans-serif" font-size="15">보상 재원</text>
    <text x="62" y="236" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="34" font-weight="800">85,000원</text>
    <text x="62" y="264" fill="#A9B7C4" font-family="Arial, sans-serif" font-size="14">충전 후 미션 보상으로 사용</text>
    <rect x="42" y="318" width="122" height="56" rx="8" fill="#1F7A5C"/>
    <text x="73" y="353" class="buttonText">충전</text>
    <rect x="176" y="318" width="122" height="56" rx="8" fill="#EEF5FC"/>
    <text x="208" y="353" class="blue" font-family="Arial, sans-serif" font-size="17" font-weight="800">내역</text>
    <text x="42" y="420" class="title" font-size="18">충전 상태</text>
    <rect x="42" y="442" width="256" height="78" rx="8" class="card"/>
    <text x="62" y="474" class="label" font-size="15">오픈뱅킹 충전</text>
    <text x="62" y="498" class="muted" font-size="14">충전 완료 후 지갑 반영</text>
    <text x="228" y="474" class="green" font-family="Arial, sans-serif" font-size="13" font-weight="800">완료</text>
    <rect x="42" y="540" width="256" height="74" rx="8" fill="#EAF6EF"/>
    <text x="62" y="572" class="green" font-family="Arial, sans-serif" font-size="15" font-weight="800">다음 단계</text>
    <text x="62" y="596" class="muted" font-size="14">자녀에게 미션과 보상 등록</text>
  </g>

  <g transform="translate(535 245)" filter="url(#shadow)">
    <rect class="phone" width="340" height="680" rx="44"/>
    <rect class="screen" x="16" y="18" width="308" height="644" rx="32"/>
    <rect x="129" y="34" width="82" height="8" rx="4" fill="#27313C"/>
    <text x="42" y="92" class="muted" font-size="14" font-weight="700">미션 만들기</text>
    <text x="42" y="126" class="title" font-size="24">미션 등록</text>
    <rect x="42" y="154" width="256" height="58" rx="8" class="card"/>
    <text x="60" y="188" class="muted" font-size="16">자녀 선택: 민준</text>
    <rect x="42" y="228" width="256" height="74" rx="8" class="card"/>
    <text x="60" y="258" class="muted" font-size="14">미션</text>
    <text x="60" y="284" class="label" font-size="17">수학 문제집 3쪽 풀기</text>
    <rect x="42" y="318" width="256" height="74" rx="8" class="card"/>
    <text x="60" y="348" class="muted" font-size="14">보상</text>
    <text x="60" y="376" class="title" font-size="24">3,000원</text>
    <rect x="42" y="416" width="256" height="72" rx="8" fill="#FFF8E8" stroke="#F1D58A"/>
    <text x="60" y="446" class="amber" font-family="Arial, sans-serif" font-size="14" font-weight="800">등록 완료</text>
    <text x="60" y="468" class="muted" font-size="13">부모 크레딧에서 보상 예약</text>
    <rect x="42" y="526" width="256" height="56" rx="8" fill="#20262D"/>
    <text x="115" y="561" class="buttonText">미션 보내기</text>
  </g>

  <g transform="translate(940 245)" filter="url(#shadow)">
    <rect class="phone" width="340" height="680" rx="44"/>
    <rect class="screen" x="16" y="18" width="308" height="644" rx="32"/>
    <rect x="129" y="34" width="82" height="8" rx="4" fill="#27313C"/>
    <text x="42" y="92" class="muted" font-size="14" font-weight="700">자녀 미션</text>
    <text x="42" y="126" class="title" font-size="24">내 미션</text>
    <rect x="42" y="154" width="256" height="122" rx="12" fill="#EEF5FC" stroke="#CFE0F4"/>
    <text x="62" y="188" class="blue" font-family="Arial, sans-serif" font-size="14" font-weight="800">진행 중</text>
    <text x="62" y="222" class="title" font-size="21">수학 문제집 3쪽</text>
    <text x="62" y="250" class="muted" font-size="15">성공하면 3,000원 벌기</text>
    <rect x="42" y="304" width="256" height="114" rx="8" class="card"/>
    <text x="62" y="336" class="label" font-size="16">완료 인증</text>
    <rect x="62" y="354" width="216" height="42" rx="8" fill="#F2F4F6"/>
    <text x="99" y="381" class="muted" font-size="14">사진 또는 메모 첨부</text>
    <rect x="42" y="450" width="256" height="72" rx="8" fill="#EAF6EF"/>
    <text x="62" y="480" class="green" font-family="Arial, sans-serif" font-size="14" font-weight="800">제출 완료</text>
    <text x="62" y="502" class="muted" font-size="13">부모 승인 대기</text>
    <rect x="42" y="556" width="256" height="56" rx="8" fill="#1F7A5C"/>
    <text x="121" y="591" class="buttonText">완료 제출</text>
  </g>

  <g transform="translate(1345 245)" filter="url(#shadow)">
    <rect class="phone" width="340" height="680" rx="44"/>
    <rect class="screen" x="16" y="18" width="308" height="644" rx="32"/>
    <rect x="129" y="34" width="82" height="8" rx="4" fill="#27313C"/>
    <text x="42" y="92" class="muted" font-size="14" font-weight="700">승인과 보상</text>
    <text x="42" y="126" class="title" font-size="24">승인과 보상</text>
    <rect x="42" y="154" width="256" height="112" rx="8" class="card"/>
    <text x="62" y="186" class="label" font-size="16">민준이 제출 완료</text>
    <text x="62" y="212" class="muted" font-size="14">수학 문제집 3쪽 풀기</text>
    <text x="62" y="238" class="green" font-family="Arial, sans-serif" font-size="16" font-weight="800">보상 3,000원</text>
    <rect x="42" y="292" width="122" height="56" rx="8" fill="#1F7A5C"/>
    <text x="72" y="327" class="buttonText">승인</text>
    <rect x="176" y="292" width="122" height="56" rx="8" fill="#F2F4F6"/>
    <text x="207" y="327" class="label" font-size="17">반려</text>
    <rect x="42" y="382" width="256" height="88" rx="8" fill="#EAF6EF"/>
    <text x="62" y="414" class="green" font-family="Arial, sans-serif" font-size="14" font-weight="800">지급 완료</text>
    <text x="62" y="440" class="muted" font-size="14">부모 지갑 -3,000</text>
    <text x="180" y="440" class="muted" font-size="14">자녀 지갑 +3,000</text>
    <text x="42" y="514" class="title" font-size="18">아이 캐시북</text>
    <rect x="42" y="536" width="256" height="78" rx="8" class="card"/>
    <text x="62" y="568" class="label" font-size="15">수학 문제집 완료</text>
    <text x="62" y="592" class="muted" font-size="14">내가 번 돈 +3,000원</text>
    <text x="228" y="568" class="green" font-family="Arial, sans-serif" font-size="13" font-weight="800">기록</text>
  </g>

  <g transform="translate(128 970)">
    <rect width="1544" height="1.5" fill="#E4E9EE"/>
    <text x="0" y="46" fill="#64707D" font-family="Arial, sans-serif" font-size="18">핵심 흐름: 부모 충전 -> 미션 등록 -> 자녀 완료 제출 -> 부모 승인 -> 보상 지급 -> 자녀 캐시북 기록</text>
  </g>
</svg>
