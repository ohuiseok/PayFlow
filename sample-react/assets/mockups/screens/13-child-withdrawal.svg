  <text x="24" y="98" fill="#151B22" font-family="Arial, sans-serif" font-size="28" font-weight="800">계좌로 보내기</text>
  <rect x="24" y="132" width="342" height="118" rx="14" fill="#17202A"/>
  <text x="48" y="170" fill="#A9B7C4" font-family="Arial, sans-serif" font-size="15">출금 가능 잔액</text>
  <text x="48" y="216" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="36" font-weight="800">17,000원</text>
  <text x="24" y="304" fill="#151B22" font-family="Arial, sans-serif" font-size="20" font-weight="800">받을 계좌</text>
  <rect x="24" y="330" width="342" height="86" rx="10" fill="#FFFFFF" stroke="#E4E9EE"/>
  <text x="48" y="364" fill="#66717C" font-family="Arial, sans-serif" font-size="15">연결 계좌</text>
  <text x="48" y="394" fill="#26313C" font-family="Arial, sans-serif" font-size="18" font-weight="800">카카오뱅크 3333-**-7890</text>
  <text x="296" y="394" fill="#2B6CB0" font-family="Arial, sans-serif" font-size="14" font-weight="800">변경</text>
  <text x="24" y="468" fill="#151B22" font-family="Arial, sans-serif" font-size="20" font-weight="800">출금 금액</text>
  <rect x="24" y="494" width="342" height="92" rx="10" fill="#FFFFFF" stroke="#E4E9EE"/>
  <text x="48" y="550" fill="#151B22" font-family="Arial, sans-serif" font-size="38" font-weight="800">10,000원</text>
