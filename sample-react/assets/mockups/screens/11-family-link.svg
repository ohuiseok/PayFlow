<svg width="390" height="844" viewBox="0 0 390 844" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="390" height="844" fill="#F7F9FA"/>
  <text x="24" y="58" fill="#66717C" font-family="Arial, sans-serif" font-size="14" font-weight="700">가족 연결</text>
  <text x="24" y="98" fill="#151B22" font-family="Arial, sans-serif" font-size="28" font-weight="800">자녀와 연결하기</text>
  <text x="24" y="128" fill="#66717C" font-family="Arial, sans-serif" font-size="15">초대 코드로 부모와 자녀 관계를 확인합니다.</text>
  <rect x="24" y="174" width="342" height="144" rx="14" fill="#17202A"/>
  <text x="48" y="216" fill="#A9B7C4" font-family="Arial, sans-serif" font-size="15">부모 초대 코드</text>
  <text x="48" y="266" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="40" font-weight="800">PF-4829</text>
  <text x="48" y="294" fill="#A9B7C4" font-family="Arial, sans-serif" font-size="14">자녀 앱에서 이 코드를 입력하세요.</text>
  <rect x="24" y="360" width="342" height="86" rx="10" fill="#FFFFFF" stroke="#E4E9EE"/>
  <text x="48" y="394" fill="#26313C" font-family="Arial, sans-serif" font-size="17" font-weight="800">연결 대기 중</text>
  <text x="48" y="421" fill="#66717C" font-family="Arial, sans-serif" font-size="14">민준이가 코드를 입력하면 승인 요청이 표시됩니다.</text>
  <rect x="24" y="480" width="342" height="104" rx="10" fill="#EAF6EF"/>
  <text x="48" y="516" fill="#1F7A5C" font-family="Arial, sans-serif" font-size="15" font-weight="800">요청 도착</text>
  <text x="48" y="548" fill="#26313C" font-family="Arial, sans-serif" font-size="18" font-weight="800">민준 · 자녀 계정</text>
  <text x="48" y="573" fill="#66717C" font-family="Arial, sans-serif" font-size="14">가족으로 연결할까요?</text>
  <rect x="24" y="636" width="162" height="58" rx="10" fill="#1F7A5C"/>
  <text x="86" y="672" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="17" font-weight="800">승인</text>
  <rect x="204" y="636" width="162" height="58" rx="10" fill="#F2F4F6"/>
  <text x="266" y="672" fill="#26313C" font-family="Arial, sans-serif" font-size="17" font-weight="800">거절</text>
</svg>
