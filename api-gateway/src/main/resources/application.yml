server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URI:http://localhost:8081}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: wallet-service
          uri: ${WALLET_SERVICE_URI:http://localhost:8082}
          predicates:
            - Path=/api/wallets/**
          filters:
            - StripPrefix=1
        - id: transfer-service
          uri: ${TRANSFER_SERVICE_URI:http://localhost:8083}
          predicates:
            - Path=/api/transfers/**
          filters:
            - StripPrefix=1
        - id: ledger-service
          uri: ${LEDGER_SERVICE_URI:http://localhost:8084}
          predicates:
            - Path=/api/ledgers/**
          filters:
            - StripPrefix=1
        - id: settlement-service
          uri: ${SETTLEMENT_SERVICE_URI:http://localhost:8085}
          predicates:
            - Path=/api/settlements/**
          filters:
            - StripPrefix=1

jwt:
  secret: ${JWT_SECRET:payflow-local-development-secret-key-change-me}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always
