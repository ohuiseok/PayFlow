server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOriginPatterns:
                  - "https://payflow-launchpad.vercel.app"
                  - "https://pay-flow.cloud"
                  - "https://www.pay-flow.cloud"
                  - "https://app.pay-flow.cloud"
                allowedMethods:
                  - GET
                  - POST
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - Authorization
                  - Content-Type
                  - Idempotency-Key
                exposedHeaders:
                  - Location
                allowCredentials: true
          default-filters:
            - RemoveRequestHeader=X-Gateway-Secret
            - RemoveRequestHeader=X-Internal-Secret
            - SetRequestHeader=X-Gateway-Secret, ${GATEWAY_INTERNAL_SECRET:${INTERNAL_SERVICE_SECRET:}}
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/api/users/**
              filters:
                - StripPrefix=1
            - id: wallet-service
              uri: ${WALLET_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/api/wallets/**
              filters:
                - StripPrefix=1
            - id: banking-service
              uri: ${BANKING_SERVICE_URI:http://localhost:8086}
              predicates:
                - Path=/api/bank/**
              filters:
                - StripPrefix=1
            - id: banking-payments-service
              uri: ${BANKING_SERVICE_URI:http://localhost:8086}
              predicates:
                - Path=/api/payments/**
              filters:
                - StripPrefix=1
            - id: openbanking-test-callback
              uri: ${BANKING_SERVICE_URI:http://localhost:8086}
              predicates:
                - Path=/test
              filters:
                - SetPath=/bank/openbanking/callback
            - id: reward-service-families
              uri: ${REWARD_SERVICE_URI:http://localhost:8087}
              predicates:
                - Path=/api/families/**
              filters:
                - StripPrefix=1
            - id: reward-service-missions
              uri: ${REWARD_SERVICE_URI:http://localhost:8087}
              predicates:
                - Path=/api/missions/**
              filters:
                - StripPrefix=1
            - id: reward-service-cashbook
              uri: ${REWARD_SERVICE_URI:http://localhost:8087}
              predicates:
                - Path=/api/cashbook/**
              filters:
                - StripPrefix=1
            - id: transfer-service
              uri: ${TRANSFER_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/api/transfers/**
              filters:
                - StripPrefix=1
            - id: ledger-service
              uri: ${LEDGER_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/api/ledgers/**
              filters:
                - StripPrefix=1
            - id: settlement-service
              uri: ${SETTLEMENT_SERVICE_URI:http://localhost:8085}
              predicates:
                - Path=/api/settlements/**
              filters:
                - StripPrefix=1

jwt:
  secret: ${JWT_SECRET:payflow-local-development-secret-key-change-me}
  expiration: ${JWT_EXPIRATION:86400000}

gateway:
  internal-secret: ${GATEWAY_INTERNAL_SECRET:${INTERNAL_SERVICE_SECRET:}}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: ${MANAGEMENT_HEALTH_SHOW_DETAILS:never}
