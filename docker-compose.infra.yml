name: ${PROJECT_NAME:-payflow}-infra

services:
  mysql:
    image: mysql:8.4
    container_name: ${PROJECT_NAME:-payflow}-mysql-dev
    environment:
      TZ: ${TZ:-Asia/Seoul}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      USER_DB_NAME: ${USER_DB_NAME:-payflow_user}
      WALLET_DB_NAME: ${WALLET_DB_NAME:-payflow_wallet}
      BANKING_DB_NAME: ${BANKING_DB_NAME:-payflow_banking}
      TRANSFER_DB_NAME: ${TRANSFER_DB_NAME:-payflow_transfer}
      REWARD_DB_NAME: ${REWARD_DB_NAME:-payflow_reward}
      LEDGER_DB_NAME: ${LEDGER_DB_NAME:-payflow_ledger}
      SETTLEMENT_DB_NAME: ${SETTLEMENT_DB_NAME:-payflow_settlement}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --innodb-buffer-pool-size=${MYSQL_BUFFER_POOL_SIZE:-384M}
      - --max-connections=${MYSQL_MAX_CONNECTIONS:-80}
      - --performance-schema=OFF
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./infrastructure/mysql/init-scripts:/docker-entrypoint-initdb.d:ro
    mem_limit: ${MYSQL_MEM_LIMIT:-512m}

  redis:
    image: redis:7-alpine
    container_name: ${PROJECT_NAME:-payflow}-redis-dev
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --maxmemory ${REDIS_MAX_MEMORY:-96mb} --maxmemory-policy ${REDIS_MAX_MEMORY_POLICY:-allkeys-lru}
    mem_limit: ${REDIS_MEM_LIMIT:-128m}

  kafka:
    image: bitnami/kafka:3.8
    container_name: ${PROJECT_NAME:-payflow}-kafka-dev
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_CFG_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: ${KAFKA_NODE_ID:-1}@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: ${KAFKA_LOCAL_ADVERTISED_LISTENERS:-PLAINTEXT://localhost:9092}
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_NUM_PARTITIONS: ${KAFKA_NUM_PARTITIONS:-1}
      KAFKA_CFG_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-24}
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS:--Xms384m -Xmx768m}
    volumes:
      - kafka_dev_data:/bitnami/kafka
    mem_limit: ${KAFKA_MEM_LIMIT:-1024m}

volumes:
  mysql_dev_data:
    name: ${MYSQL_DEV_VOLUME_NAME:-payflow_mysql_dev_data}
  kafka_dev_data:
    name: ${KAFKA_DEV_VOLUME_NAME:-payflow_kafka_dev_data}
